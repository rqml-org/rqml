name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version comes from package.json "packageManager"; don't also pass `version`.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Dogfood: this repo is specified in requirements.rqml; the same gate
      # we ship is the gate we pass. Validates the spec, checks coverage, and
      # drift-checks every implements edge against .rqml/baseline.json.
      - name: RQML gate
        run: node packages/cli/dist/index.js check
